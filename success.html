<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Success - PhysicX</title>
  <meta name="description" content="PhysicX payment success page that waits for backend license activation before redirecting." />
  <link rel="icon" type="image/png" href="assets/icon/logo.png" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="auth.css" />
  <style>
    .success-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 6rem 1.25rem 3rem;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.12), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }
    .success-card {
      width: min(640px, 100%);
      padding: 2rem;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .success-card h1 {
      margin: 0.9rem 0 0.8rem;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }
    .success-card p {
      color: var(--clr-text-3);
      line-height: 1.7;
    }
  </style>
</head>
<body data-page="payment-success">
  <main class="success-shell">
    <section class="success-card reveal">
      <span class="badge badge-green">Payment received</span>
      <h1>Thank you for choosing PhysicX.</h1>
      <div id="success-message" class="status-message status-info show" style="margin-top:1rem;">
        Verifying your paid license...
      </div>
      <p id="success-detail">
        We are waiting for the backend webhook to activate your license, then this page will take you to the dashboard automatically.
      </p>
      <div style="display:flex; justify-content:center; gap:0.9rem; flex-wrap:wrap; margin-top:1.5rem;">
        <a class="btn btn-primary" href="dashboard.html">Open dashboard now</a>
        <a class="btn btn-secondary" href="pricing.html">Back to pricing</a>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/payment.js"></script>
</body>
</html>
